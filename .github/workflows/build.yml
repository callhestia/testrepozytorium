name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: cmake -B retinere/build -S retinere -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build retinere/build

      - name: Run tests
        run: ctest --test-dir retinere/build --output-on-failure
